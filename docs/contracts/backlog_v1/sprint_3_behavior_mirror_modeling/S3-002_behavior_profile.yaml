  - "画像结果可直接作为模板匹配输入。"
  - "画像输出具备版本号或结构标识，便于后续演进。"
  - "画像摘要能够被 Agent 主页复用。"

constraints:
  - "优先在现有 schema 上增量扩展。"
  - "画像必须保持可解释，不引入难以审计的黑箱字段。"

out_of_scope:
  - "不在本 Story 中决定模板类型。"
  - "不在本 Story 中直接生成交易动作。"

dependencies:
