task_id: "S3-002"
task_name: "TradingBehaviorProfile 生成"
sprint: "Sprint 3 行为镜像建模与策略壳"
epic: "Epic 3.1 Feature & Profile"
story_id: "S3-002"
blast_radius: "L2"
