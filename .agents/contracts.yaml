contract_policy:
  change_units:
    execution_unit: story
    planning_units:
      - backlog
      - sprint
      - epic
  boundaries:
    allowed_roots:
      - docs/contracts
      - apps/api
      - apps/web
      - scripts
    protected_paths:
      - .agents
  required_gates:
    - code_style_review
    - tester
    - reviewer
    - code_acceptance
    - acceptance_gate

contracts:
  - name: AgentSnapshot
    owner: backend
    consumers:
      - frontend
    path: "apps/api/src/schemas/agent.py"

  - name: WorldSnapshot
    owner: backend
    consumers:
      - frontend
      - worker
    path: "apps/api/src/schemas/world.py"

  - name: TradeLog
    owner: backend
    consumers:
      - frontend
    path: "apps/api/src/schemas/trade.py"

  - name: ApiResponse
    owner: backend
    consumers:
      - frontend
    path: "apps/api/src/schemas/common.py"
