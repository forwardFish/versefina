services:
  postgres:
    image: postgres:16-alpine
    container_name: versefina-postgres
    environment:
      POSTGRES_DB: versefina
      POSTGRES_USER: versefina
      POSTGRES_PASSWORD: versefina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: versefina-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
