primary_files:
  - "apps/api/src/domain/belief_engine/belief_graph.py"

secondary_files:
  - "apps/api/src/schemas/belief_graph.py"

test_cases:
  normal:
    - "正常路径：共识侧包含游资和机构，consensus_composition 记录各自比例。"
    - "正常路径：分歧侧只有散户，dissent_composition 记录散户 100%。"
  exception:
    - "异常路径：参与者信息缺失，构成字段返回 null。"
