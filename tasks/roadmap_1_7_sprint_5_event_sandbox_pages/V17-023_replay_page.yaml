agent_policy: "auto"
goal: "Create /event-sandbox/[eventId]/replay so the user can replay each simulation round and watch how actions, influence, belief, and market state evolve."
business_value: "Makes the one-round-to-the-next fermentation path visible instead of compressing everything into one summary."
entry_criteria:
  - "V17-022 is complete and replay-ready payloads are available through the query API."
acceptance_criteria:
  - "GET /event-sandbox/[eventId]/replay renders per-round replay navigation."
  - "Switching rounds updates actions, influence edges, belief state, market state, and scenario summary."
  - "The page explains turning points and first move/follow/exit transitions."
constraints:
  - "Replay must be driven by persisted round payloads rather than recomputing the simulation in the browser."
out_of_scope:
  - "No participant-specific deep drill-down in this story."
dependencies:
  - "V17-022"
preview_base_url: "http://127.0.0.1:3000"
preview_urls:
