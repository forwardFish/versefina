goal: "Create /event-sandbox/[eventId] so the user can see the event card, participant roster, round timeline, influence network, and market-state changes in one place."
business_value: "Makes the evolving simulation understandable without digging through raw payloads or runtime folders."
entry_criteria:
  - "V17-021 is complete and one real event can already be created from the browser."
acceptance_criteria:
  - "GET /event-sandbox/[eventId] renders an overview for one event."
  - "The page shows event summary, participant activation, round timeline, influence graph, belief shifts, market state, and scenario state."
  - "The page renders a stable empty or not-found state when the event is missing."
constraints:
  - "The first screen must explain the business state, not dump raw JSON."
out_of_scope:
  - "No dedicated replay or participant drill-down page in this story."
dependencies:
  - "V17-021"
