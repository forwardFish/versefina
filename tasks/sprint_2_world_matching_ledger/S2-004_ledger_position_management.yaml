task_id: "S2-004"
task_name: "账本与持仓管理"
sprint: "Sprint 2 世界、撮合、账本、日循环"
epic: "Epic 2.2 Matching & Execution"
story_id: "S2-004"
blast_radius: "L3"
execution_mode: "Safe"
mode: "Safe"

goal: "实现 Agent 账本（Ledger）和持仓（Position）管理，记录每笔交易后的资金和持仓变化。"
business_value: "为 Agent 提供准确的资金和持仓状态，支持后续的绩效分析和风控检查。"

entry_criteria:
  - "S2-003 撮合引擎已完成。"

acceptance_criteria:
  - "Ledger 包含：cash、total_value、positions、pnl、created_at、updated_at。"
  - "每笔成交后自动更新 cash 和 positions。"
  - "Position 包含：symbol、qty、avg_cost、market_value、unrealized_pnl。"
  - "支持查询账本快照 GET /api/v1/agents/{agent_id}/ledger。"
  - "支持查询持仓列表 GET /api/v1/agents/{agent_id}/positions。"
  - "账本变更记录完整的审计日志。"

constraints:
  - "账本更新必须是原子操作，防止并发导致数据不一致。"
  - "持仓数量不能为负（不支持做空）。"

out_of_scope:
  - "不实现融资融券账本。"
  - "不实现多币种账本。"

dependencies:
  - "S2-003 撮合引擎。"

related_files:
  - "apps/api/src/domain/ledger/service.py"
  - "apps/api/src/schemas/ledger.py"
  - "apps/api/src/api/v1/agents.py"

primary_files:
  - "apps/api/src/domain/ledger/service.py"

secondary_files:
  - "apps/api/src/schemas/ledger.py"

test_cases:
  normal:
    - "正常路径：买入后 cash 减少，positions 增加对应持仓。"
    - "正常路径：卖出后 cash 增加，positions 减少对应持仓。"
    - "正常路径：查询账本快照，返回当前 cash 和 total_value。"
  exception:
    - "异常路径：卖出数量超过持仓，订单拒绝。"
    - "异常路径：并发更新账本，保证原子性。"
