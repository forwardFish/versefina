goal: "Redesign the left side of the event sandbox so the user sees Event Graph context, causal chain, confirmation and invalidation signals, and finahunt lineage first."
business_value: "Makes the source event and its transmission path understandable before the user reads the rest of the wall."
entry_criteria:
  - "V18-020 is complete and event, structure, mapping, and lineage payloads are queryable."
acceptance_criteria:
  - "GET /event-sandbox/[eventId] shows a left Event Graph + lineage panel."
  - "The panel shows source message, structured event, commodity/sector/symbol, confirmation, invalidation, and finahunt context."
  - "The first screen remains human-readable and does not dump raw JSON."
constraints:
  - "This story must use the existing event-sandbox route instead of creating a second host."
out_of_scope:
  - "No population interaction canvas in this story."
